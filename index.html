<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신디 챌린지 순위</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F6F5F2;
  --card: #FFFFFF;
  --border: rgba(0,0,0,0.08);
  --text: #1A1A18;
  --muted: #6B6A65;
  --accent: #1A4FBF;
  --accent-light: #E8EEFB;
  --gold:   #C9972B;
  --silver: #8A9099;
  --bronze: #B56832;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
header {
  background: var(--text);
  color: #fff;
  padding: 1.8rem 1.5rem 1.4rem;
  text-align: center;
}
header h1 { font-size: clamp(1.3rem, 4vw, 1.9rem); font-weight: 900; letter-spacing: -0.02em; }
header p  { font-size: 0.82rem; opacity: 0.5; margin-top: 4px; }
#lastUpdated {
  display: inline-block;
  margin-top: 10px;
  font-size: 0.73rem;
  background: rgba(255,255,255,0.1);
  padding: 3px 12px;
  border-radius: 20px;
}

/* TOPBAR */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 8px;
}
.cls-filter { display: flex; gap: 6px; flex-wrap: wrap; }
.cls-btn {
  padding: 5px 14px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--muted);
  font-size: 0.78rem;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.cls-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

#refreshBtn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 14px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 16px;
  font-size: 0.78rem; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
}
#refreshBtn:hover { opacity: 0.85; }
.spin { display: inline-block; }
#refreshBtn.loading .spin { animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* TABS */
.tabs {
  display: flex;
  background: var(--card);
  border-bottom: 2px solid var(--border);
}
.tab-btn {
  flex: 1;
  padding: 13px 8px;
  border: none; background: transparent;
  color: var(--muted);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.85rem; font-weight: 700;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* PANELS */
.panel { display: none; max-width: 860px; margin: 0 auto; padding: 16px; }
.panel.active { display: block; }

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 0.85rem 1rem;
}
.stat-card .label { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; }
.stat-card .value { font-size: 1.4rem; font-weight: 700; }

/* PODIUM */
.podium {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 8px;
  margin-bottom: 16px;
}
.p-item { flex: 1; max-width: 200px; text-align: center; }
.p-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px 12px 0 0;
  padding: 1rem 0.75rem 0.75rem;
}
.p-item.p1 .p-card { border-top: 3px solid var(--gold); }
.p-item.p2 .p-card { border-top: 3px solid var(--silver); }
.p-item.p3 .p-card { border-top: 3px solid var(--bronze); }
.p-medal  { font-size: 1.8rem; line-height: 1; }
.p-name   { font-size: 0.82rem; font-weight: 700; margin-top: 6px; word-break: keep-all; }
.p-sub    { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
.p-score  { font-size: 1.2rem; font-weight: 700; margin-top: 6px; }
.p-item.p1 .p-score { color: var(--gold); }
.p-item.p2 .p-score { color: var(--silver); }
.p-item.p3 .p-score { color: var(--bronze); }
.p-step {
  background: var(--border);
  border-radius: 0 0 4px 4px;
  font-size: 0.7rem; font-weight: 700;
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
}
.p-item.p1 .p-step { height: 52px; }
.p-item.p2 .p-step { height: 36px; }
.p-item.p3 .p-step { height: 22px; }

/* TABLE */
.tbl-wrap { overflow-x: auto; }
table {
  width: 100%; border-collapse: collapse;
  background: var(--card);
  border-radius: 14px; overflow: hidden;
  border: 1px solid var(--border);
  font-size: 0.87rem;
}
thead tr { background: #F0EFEB; }
th { padding: 10px 14px; text-align: left; font-size: 0.73rem; font-weight: 600; color: var(--muted); white-space: nowrap; }
td { padding: 11px 14px; border-top: 1px solid var(--border); vertical-align: middle; }
tr:hover td { background: #FAFAF8; }

.rnum { font-weight: 700; font-size: 1rem; }
.r1 { color: var(--gold); }
.r2 { color: var(--silver); }
.r3 { color: var(--bronze); }
.rn { color: var(--muted); }
.name-cell { font-weight: 500; }
.cls-badge {
  display: inline-block;
  background: var(--accent-light); color: var(--accent);
  font-size: 0.7rem; padding: 2px 8px;
  border-radius: 20px; font-weight: 500;
}
.sc { font-weight: 700; }
.bar-wrap { display: flex; align-items: center; gap: 6px; }
.bar-bg { background: #EDEDEA; border-radius: 4px; height: 6px; flex: 1; min-width: 50px; overflow: hidden; }
.bar-fill { height: 6px; border-radius: 4px; background: var(--accent); transition: width 0.5s ease; }

/* class ranking specific */
.avg-score { font-weight: 700; color: var(--accent); }
.member-count { color: var(--muted); font-size: 0.78rem; }

/* EMPTY */
.empty { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.88rem; }
.empty-icon { font-size: 2.2rem; display: block; margin-bottom: 8px; }

@media (max-width: 600px) {
  .bar-wrap { display: none; }
  td, th { padding: 9px 8px; }
}
</style>
</head>
<body>

<header>
  <h1>🏋️ 신디 챌린지 순위</h1>
  <p>라운드 우선 · 동 라운드면 추가 횟수로 순위 결정</p>
  <span id="lastUpdated">로딩 중...</span>
</header>

<div class="topbar">
  <div class="cls-filter" id="clsFilter">
    <button class="cls-btn active" onclick="setClass('all', this)">전체</button>
  </div>
  <button id="refreshBtn" onclick="loadData()">
    <span class="spin">↻</span> 새로고침
  </button>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('personal', this)">🏃 개인 순위</button>
  <button class="tab-btn"       onclick="switchTab('class', this)">🏫 학급 순위</button>
</div>

<!-- 개인 순위 -->
<div class="panel active" id="panel-personal">
  <div class="stats">
    <div class="stat-card"><div class="label">참가 팀</div><div class="value" id="s-teams">—</div></div>
    <div class="stat-card"><div class="label">평균 라운드</div><div class="value" id="s-avg">—</div></div>
    <div class="stat-card"><div class="label">최고 기록</div><div class="value" id="s-best">—</div></div>
    <div class="stat-card"><div class="label">참여 반</div><div class="value" id="s-cls">—</div></div>
  </div>
  <div class="podium" id="pod-personal"></div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th style="width:50px">순위</th>
        <th>이름 (팀)</th>
        <th>반</th>
        <th>라운드</th>
        <th>추가 횟수</th>
        <th style="min-width:120px">비율</th>
      </tr></thead>
      <tbody id="tb-personal"></tbody>
    </table>
  </div>
</div>

<!-- 학급 순위 -->
<div class="panel" id="panel-class">
  <div class="podium" id="pod-class"></div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th style="width:50px">순위</th>
        <th>반</th>
        <th>참가 팀 수</th>
        <th>평균 라운드</th>
        <th style="min-width:120px">비율</th>
      </tr></thead>
      <tbody id="tb-class"></tbody>
    </table>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwZW2lT_rKzkVcH_2414Pvd79WlCylv-TWY7Jx6m8VC42s4SMbNPAw39vwqkD_mky23Cg/exec';

let allData = [];
let currentClass = 'all';
let currentTab = 'personal';

// ── LOAD ─────────────────────────────────────────────
async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  document.getElementById('lastUpdated').textContent = '로딩 중...';
  try {
    const res  = await fetch(API_URL + '?t=' + Date.now());
    const json = await res.json();
    if (!json.success) throw new Error('응답 오류');
    allData = json.data;
    buildClassFilter();
    renderAll();
    const n = new Date();
    document.getElementById('lastUpdated').textContent =
      '업데이트: ' + n.toLocaleTimeString('ko-KR');
  } catch(e) {
    document.getElementById('lastUpdated').textContent = '로드 실패';
    console.error(e);
  } finally {
    btn.classList.remove('loading');
  }
}

// ── CLASS FILTER ─────────────────────────────────────
function buildClassFilter() {
  const classes = [...new Set(allData.map(r => r.cls))].sort();
  const bar = document.getElementById('clsFilter');
  bar.innerHTML = '<button class="cls-btn active" onclick="setClass(\'all\', this)">전체</button>';
  classes.forEach(cls => {
    const b = document.createElement('button');
    b.className = 'cls-btn';
    b.textContent = cls;
    b.onclick = function(){ setClass(cls, this); };
    bar.appendChild(b);
  });
}

function setClass(cls, btn) {
  currentClass = cls;
  document.querySelectorAll('.cls-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function filtered() {
  if (currentClass === 'all') return [...allData];
  return allData.filter(r => r.cls === currentClass);
}

// ── RENDER ALL ───────────────────────────────────────
function renderAll() {
  renderPersonal();
  renderClassRanking();
}

// ── BADGE ────────────────────────────────────────────
function badge(i) {
  const medals = ['🥇','🥈','🥉'];
  if (i < 3) return `<span class="rnum r${i+1}">${medals[i]}</span>`;
  return `<span class="rnum rn">#${i+1}</span>`;
}

// ── PODIUM ───────────────────────────────────────────
function renderPodium(elId, top3, nameFn, subFn, scoreFn) {
  const el = document.getElementById(elId);
  if (!top3.length) { el.innerHTML = ''; return; }
  const ORDER   = [1, 0, 2];
  const CLASSES = ['p2','p1','p3'];
  const MEDALS  = ['🥇','🥈','🥉'];
  el.innerHTML = ORDER.map(idx => {
    if (!top3[idx]) return '';
    const r = top3[idx];
    return `<div class="p-item ${CLASSES[ORDER.indexOf(idx)]}">
      <div class="p-card">
        <div class="p-medal">${MEDALS[idx]}</div>
        <div class="p-name">${nameFn(r)}</div>
        ${subFn ? `<div class="p-sub">${subFn(r)}</div>` : ''}
        <div class="p-score">${scoreFn(r)}</div>
      </div>
      <div class="p-step">${idx+1}위</div>
    </div>`;
  }).join('');
}

// ── 개인 순위 ─────────────────────────────────────────
function renderPersonal() {
  const data = filtered().sort((a,b) => b.rounds - a.rounds || b.extra - a.extra);

  // 통계
  const best = [...allData].sort((a,b) => b.rounds - a.rounds || b.extra - a.extra)[0];
  document.getElementById('s-teams').textContent = allData.length + '팀';
  document.getElementById('s-avg').textContent   =
    Math.round(allData.reduce((s,r) => s+r.rounds, 0) / allData.length) + 'R';
  document.getElementById('s-best').textContent  = best ? best.rounds + 'R +' + best.extra : '—';
  document.getElementById('s-cls').textContent   = new Set(allData.map(r=>r.cls)).size + '개';

  // 포디엄
  renderPodium('pod-personal', data.slice(0,3),
    r => r.names,
    r => r.cls,
    r => r.rounds + 'R +' + r.extra
  );

  // 테이블
  const maxR = data[0]?.rounds || 1;
  const tb = document.getElementById('tb-personal');
  if (!data.length) {
    tb.innerHTML = `<tr><td colspan="6" class="empty"><span class="empty-icon">📋</span>데이터가 없습니다</td></tr>`;
    return;
  }
  tb.innerHTML = data.map((r,i) => {
    const pct = Math.round((r.rounds / maxR) * 100);
    return `<tr>
      <td>${badge(i)}</td>
      <td class="name-cell">${r.names}</td>
      <td><span class="cls-badge">${r.cls}</span></td>
      <td class="sc">${r.rounds}R</td>
      <td class="sc">+${r.extra}</td>
      <td><div class="bar-wrap">
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span style="font-size:.73rem;color:#888;min-width:30px">${pct}%</span>
      </div></td>
    </tr>`;
  }).join('');
}

// ── 학급 순위 ─────────────────────────────────────────
function renderClassRanking() {
  // 반별 그룹핑
  const map = {};
  allData.forEach(r => {
    if (!map[r.cls]) map[r.cls] = { cls: r.cls, total: 0, count: 0 };
    map[r.cls].total += r.rounds;
    map[r.cls].count++;
  });

  const ranked = Object.values(map).map(c => ({
    cls:   c.cls,
    count: c.count,
    avg:   Math.round((c.total / c.count) * 10) / 10  // 소수점 1자리
  })).sort((a,b) => b.avg - a.avg);

  // 포디엄
  renderPodium('pod-class', ranked.slice(0,3),
    r => r.cls,
    r => r.count + '팀 참가',
    r => '평균 ' + r.avg + 'R'
  );

  // 테이블
  const maxAvg = ranked[0]?.avg || 1;
  const tb = document.getElementById('tb-class');
  if (!ranked.length) {
    tb.innerHTML = `<tr><td colspan="5" class="empty"><span class="empty-icon">📋</span>데이터가 없습니다</td></tr>`;
    return;
  }
  tb.innerHTML = ranked.map((r,i) => {
    const pct = Math.round((r.avg / maxAvg) * 100);
    return `<tr>
      <td>${badge(i)}</td>
      <td class="name-cell">${r.cls}</td>
      <td class="member-count">${r.count}팀</td>
      <td class="avg-score">${r.avg}R</td>
      <td><div class="bar-wrap">
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span style="font-size:.73rem;color:#888;min-width:30px">${pct}%</span>
      </div></td>
    </tr>`;
  }).join('');
}

// ── TABS ─────────────────────────────────────────────
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

// 초기 로드 & 30초 자동 갱신
loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
