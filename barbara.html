<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바바라 와드 순위</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:   #C9972B;
    --silver: #8A9099;
    --bronze: #B56832;
    --bg:     #F6F5F2;
    --card:   #FFFFFF;
    --text:   #1A1A18;
    --muted:  #6B6A65;
    --border: rgba(0,0,0,0.08);
    --accent: #1A4FBF;
    --accent-light: #E8EEFB;
  }

  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--text);
    color: #fff;
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
  }
  header h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 700; letter-spacing: -0.02em; }
  header p { font-size: 0.85rem; opacity: 0.55; margin-top: 4px; }
  #lastUpdated {
    display: inline-block; margin-top: 10px; font-size: 0.75rem;
    background: rgba(255,255,255,0.1); padding: 3px 12px; border-radius: 20px;
  }

  /* 탭 */
  #tabBar {
    display: none; gap: 0; padding: 1rem 1.5rem 0;
    max-width: 860px; margin: 0 auto;
  }
  #tabBar button {
    flex: 1; padding: 10px; font-size: 14px; font-weight: 500;
    border: 1px solid var(--border); border-bottom: none;
    border-radius: 10px 10px 0 0; cursor: pointer; font-family: inherit;
    transition: background 0.15s;
  }
  #tab-individual { background: #fff; color: var(--accent); margin-right: 4px; }
  #tab-class      { background: var(--bg); color: var(--muted); }

  /* 컨트롤 */
  .controls {
    display: none; gap: 8px; padding: 1rem 1.5rem;
    max-width: 860px; margin: 0 auto; flex-wrap: wrap; align-items: center;
  }
  .controls label { font-size: 0.8rem; color: var(--muted); }
  .controls select {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 0.82rem; background: var(--card); color: var(--text); font-family: inherit;
  }
  #refreshBtn {
    margin-left: auto; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; padding: 6px 14px;
    font-size: 0.82rem; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: inherit;
  }
  #refreshBtn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 요약 카드 */
  .stats {
    display: none; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px; padding: 0 1.5rem 1.25rem; max-width: 860px; margin: 0 auto;
  }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 0.9rem 1rem; }
  .stat-card .label { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; }
  .stat-card .value { font-size: 1.3rem; font-weight: 700; }

  /* 포디엄 */
  .podium { display: none; justify-content: center; align-items: flex-end; gap: 8px; padding: 0 1.5rem 1.5rem; max-width: 860px; margin: 0 auto; }
  .podium-item { flex: 1; max-width: 200px; text-align: center; }
  .podium-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px 12px 0 0; padding: 1rem 0.75rem 0.75rem; }
  .podium-item.p1 .podium-card { border-top: 3px solid var(--gold); }
  .podium-item.p2 .podium-card { border-top: 3px solid var(--silver); }
  .podium-item.p3 .podium-card { border-top: 3px solid var(--bronze); }
  .podium-medal { font-size: 1.8rem; }
  .podium-name  { font-size: 0.82rem; font-weight: 700; margin-top: 6px; word-break: keep-all; }
  .podium-class { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .podium-score { font-size: 1.1rem; font-weight: 700; margin-top: 6px; }
  .podium-item.p1 .podium-score { color: var(--gold); }
  .podium-item.p2 .podium-score { color: var(--silver); }
  .podium-item.p3 .podium-score { color: var(--bronze); }
  .podium-step { background: var(--border); border-radius: 0 0 4px 4px; font-size: 0.7rem; font-weight: 700; color: var(--muted); display: flex; align-items: center; justify-content: center; }
  .podium-item.p1 .podium-step { height: 52px; }
  .podium-item.p2 .podium-step { height: 36px; }
  .podium-item.p3 .podium-step { height: 22px; }

  /* 테이블 */
  .table-wrap { max-width: 860px; margin: 0 auto; padding: 0 1.5rem 2.5rem; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 14px; overflow: hidden; border: 1px solid var(--border); font-size: 0.88rem; }
  thead tr { background: #F0EFEb; }
  th { text-align: left; padding: 10px 14px; font-size: 0.75rem; font-weight: 500; color: var(--muted); white-space: nowrap; }
  td { padding: 11px 14px; border-top: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: #FAFAF8; }

  .rank-num { font-weight: 700; font-size: 1rem; color: var(--muted); }
  .rank-1 { color: var(--gold); }
  .rank-2 { color: var(--silver); }
  .rank-3 { color: var(--bronze); }
  .name-col { font-weight: 500; }
  .cls-badge { display: inline-block; background: var(--accent-light); color: var(--accent); font-size: 0.72rem; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .dnf-badge { display: inline-block; background: #FFF3CD; color: #856404; font-size: 0.72rem; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .score-col { font-weight: 700; }
  .bar-wrap { display: flex; align-items: center; gap: 6px; }
  .bar-bg { background: #EDEDEA; border-radius: 4px; height: 6px; flex: 1; min-width: 50px; overflow: hidden; }
  .bar-fill { height: 6px; border-radius: 4px; background: var(--accent); transition: width 0.5s ease; }

  .state-msg { text-align: center; padding: 3rem 1.5rem; color: var(--muted); font-size: 0.9rem; }
  .state-msg .icon { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }
  .error-msg { color: #B00020; }

  @media (max-width: 600px) {
    .podium { gap: 4px; }
    .podium-name { font-size: 0.72rem; }
    td, th { padding: 9px 8px; }
    .bar-wrap { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>💪 바바라 와드 순위</h1>
  <p>5라운드 완료 시간 기준 · 짧을수록 높은 순위</p>
  <span id="lastUpdated">불러오는 중...</span>
</header>

<!-- 탭 -->
<div id="tabBar" style="display:flex">
  <button id="tab-individual" onclick="switchTab('individual')">🏃 개인 순위</button>
  <button id="tab-class"      onclick="switchTab('class')">🏫 학급 순위</button>
</div>

<!-- 개인 순위 -->
<div id="panel-individual">
  <div class="controls" id="controlBar">
    <label>반 필터</label>
    <select id="clsFilter" onchange="render()"><option value="">전체</option></select>
    <button id="refreshBtn" onclick="fetchData()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      새로고침
    </button>
  </div>

  <div class="stats" id="statsRow">
    <div class="stat-card"><div class="label">참가 팀</div><div class="value" id="s-teams">—</div></div>
    <div class="stat-card"><div class="label">최고 기록</div><div class="value" id="s-best">—</div></div>
    <div class="stat-card"><div class="label">평균 기록</div><div class="value" id="s-avg">—</div></div>
    <div class="stat-card"><div class="label">완수 팀</div><div class="value" id="s-done">—</div></div>
  </div>

  <div class="podium" id="podiumRow"></div>

  <div class="table-wrap">
    <div id="stateMsg" class="state-msg">
      <span class="icon">⏳</span>데이터를 불러오는 중...
    </div>
    <table id="rankTable" style="display:none">
      <thead>
        <tr>
          <th style="width:50px">순위</th>
          <th>이름 (팀)</th>
          <th>반</th>
          <th>기록</th>
          <th>완수 여부</th>
          <th style="min-width:120px">비율</th>
        </tr>
      </thead>
      <tbody id="rankBody"></tbody>
    </table>
  </div>
</div>

<!-- 학급 순위 -->
<div id="panel-class" style="display:none">
  <div class="table-wrap" style="padding-top:1rem">
    <table id="clsTable" style="display:none">
      <thead>
        <tr>
          <th style="width:50px">순위</th>
          <th>학급</th>
          <th>참가 팀</th>
          <th>완수 팀</th>
          <th>평균 기록</th>
          <th style="min-width:120px">비율</th>
        </tr>
      </thead>
      <tbody id="clsBody"></tbody>
    </table>
  </div>
</div>

<script>
// ★ 여기에 Apps Script 배포 URL을 붙여넣으세요 ★
const API_URL = 'https://script.google.com/macros/s/AKfycbx3YudyZSL8YIISsDYIARUnoxXXbe4PyeNM8mZRUndtJqtVUNqwUm__25lpw07pKE1R/exec';

let allData = [];

function fmtTime(totalSecs) {
  const m = Math.floor(totalSecs / 60);
  const s = totalSecs % 60;
  return `${m}분 ${String(s).padStart(2,'0')}초`;
}

// ── 탭 전환 ──
function switchTab(tab) {
  document.getElementById('panel-individual').style.display = tab === 'individual' ? 'block' : 'none';
  document.getElementById('panel-class').style.display      = tab === 'class'       ? 'block' : 'none';
  document.getElementById('tab-individual').style.background = tab === 'individual' ? '#fff' : 'var(--bg)';
  document.getElementById('tab-individual').style.color      = tab === 'individual' ? 'var(--accent)' : 'var(--muted)';
  document.getElementById('tab-class').style.background      = tab === 'class'       ? '#fff' : 'var(--bg)';
  document.getElementById('tab-class').style.color           = tab === 'class'       ? 'var(--accent)' : 'var(--muted)';
  if (tab === 'class') renderClass();
}

// ── 데이터 불러오기 ──
async function fetchData() {
  const btn = document.getElementById('refreshBtn');
  if (btn) btn.classList.add('spinning');

  try {
    const res  = await fetch(API_URL);
    const json = await res.json();
    if (!json.success) throw new Error('응답 오류');
    allData = json.data;
    buildFilters();
    render();
    document.getElementById('tabBar').style.display = 'flex';
    document.getElementById('lastUpdated').textContent =
      '마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR');
  } catch (e) {
    document.getElementById('stateMsg').innerHTML =
      '<span class="icon">❌</span>데이터를 불러오지 못했습니다.<br>Apps Script URL과 배포 설정을 확인해주세요.';
    document.getElementById('stateMsg').className = 'state-msg error-msg';
    console.error(e);
  } finally {
    if (btn) btn.classList.remove('spinning');
  }
}

// ── 필터 구성 ──
function buildFilters() {
  const sel = document.getElementById('clsFilter');
  const classes = [...new Set(allData.map(r => r.cls))].sort();
  sel.innerHTML = '<option value="">전체</option>' + classes.map(c => `<option>${c}</option>`).join('');
  document.getElementById('controlBar').style.display = 'flex';
  document.getElementById('statsRow').style.display   = 'grid';
}

// ── 개인 순위 렌더링 ──
function render() {
  const cls  = document.getElementById('clsFilter').value;
  let data   = cls ? allData.filter(r => r.cls === cls) : [...allData];

  // 완수자: 시간 짧은 순 / 미완수자: 라운드 많은 순
  data.sort((a, b) => {
    if (a.completed && b.completed) return a.totalSecs - b.totalSecs;
    if (a.completed) return -1;
    if (b.completed) return 1;
    return b.dnf_rounds - a.dnf_rounds;
  });

  if (!data.length) {
    document.getElementById('stateMsg').innerHTML = '<span class="icon">📭</span>해당 반의 데이터가 없습니다.';
    document.getElementById('stateMsg').style.display = 'block';
    document.getElementById('rankTable').style.display = 'none';
    return;
  }

  const completedAll  = allData.filter(r => r.completed);
  const completedData = data.filter(r => r.completed);
  const bestSecs      = completedAll.length ? completedAll[0].totalSecs : null;
  const avgSecs       = completedAll.length
    ? Math.round(completedAll.reduce((s, r) => s + r.totalSecs, 0) / completedAll.length) : null;

  document.getElementById('s-teams').textContent = allData.length + '팀';
  document.getElementById('s-best').textContent  = bestSecs !== null ? fmtTime(bestSecs) : '—';
  document.getElementById('s-avg').textContent   = avgSecs  !== null ? fmtTime(avgSecs)  : '—';
  document.getElementById('s-done').textContent  = completedAll.length + '팀';

  // 포디엄 (완수자 중 상위 3)
  renderPodium(completedData.slice(0, 3));

  // 테이블
  const MEDALS  = ['🥇','🥈','🥉'];
  const minSecs = completedData.length ? completedData[0].totalSecs : 1;

  document.getElementById('rankBody').innerHTML = data.map((r, i) => {
    const rankClass = i < 3 && r.completed ? `rank-${i+1}` : '';
    const rankLabel = i < 3 && r.completed ? MEDALS[i] : `#${i+1}`;
    const timeDisp  = r.completed
      ? `<span class="score-col">${fmtTime(r.totalSecs)}</span>`
      : `<span style="color:var(--muted)">${r.minutes}분 ${r.seconds}초+</span>`;
    const badge = r.completed
      ? `<span class="cls-badge" style="background:#d4edda;color:#155724">완수 ✓</span>`
      : `<span class="dnf-badge">DNF (${r.dnf_rounds}라운드)</span>`;
    const pct   = r.completed && minSecs ? Math.round((minSecs / r.totalSecs) * 100) : 0;
    const bar   = r.completed
      ? `<div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div><span style="font-size:0.75rem;color:#888;min-width:30px">${pct}%</span></div>`
      : `<span style="font-size:0.75rem;color:var(--muted)">—</span>`;
    return `<tr>
      <td><span class="rank-num ${rankClass}">${rankLabel}</span></td>
      <td class="name-col">${r.names}</td>
      <td><span class="cls-badge">${r.cls}</span></td>
      <td>${timeDisp}</td>
      <td>${badge}</td>
      <td>${bar}</td>
    </tr>`;
  }).join('');

  document.getElementById('stateMsg').style.display  = 'none';
  document.getElementById('rankTable').style.display = 'table';
}

// ── 포디엄 ──
function renderPodium(top) {
  const MEDALS  = ['🥇','🥈','🥉'];
  const ORDER   = [1, 0, 2];
  const CLASSES = ['p2','p1','p3'];
  const container = document.getElementById('podiumRow');
  if (!top.length) { container.style.display = 'none'; return; }
  container.innerHTML = ORDER.map(idx => {
    if (!top[idx]) return '';
    const r = top[idx];
    return `<div class="podium-item ${CLASSES[ORDER.indexOf(idx)]}">
      <div class="podium-card">
        <div class="podium-medal">${MEDALS[idx]}</div>
        <div class="podium-name">${r.names}</div>
        <div class="podium-class">${r.cls}</div>
        <div class="podium-score">${fmtTime(r.totalSecs)}</div>
      </div>
      <div class="podium-step">${idx+1}위</div>
    </div>`;
  }).join('');
  container.style.display = 'flex';
}

// ── 학급 순위 렌더링 ──
function renderClass() {
  const classMap = {};
  allData.forEach(r => {
    if (!classMap[r.cls]) classMap[r.cls] = { cls: r.cls, totalSecs: 0, completedCount: 0, count: 0 };
    classMap[r.cls].count++;
    if (r.completed) {
      classMap[r.cls].totalSecs += r.totalSecs;
      classMap[r.cls].completedCount++;
    }
  });

  let clsData = Object.values(classMap).map(c => ({
    cls: c.cls,
    count: c.count,
    completedCount: c.completedCount,
    avgSecs: c.completedCount ? Math.round(c.totalSecs / c.completedCount) : null,
  }));

  // 완수팀 많은 반 우선, 같으면 평균 시간 짧은 순
  clsData.sort((a, b) => {
    if (b.completedCount !== a.completedCount) return b.completedCount - a.completedCount;
    if (a.avgSecs === null) return 1;
    if (b.avgSecs === null) return -1;
    return a.avgSecs - b.avgSecs;
  });

  if (!clsData.length) return;

  const MEDALS  = ['🥇','🥈','🥉'];
  const bestAvg = clsData.find(c => c.avgSecs)?.avgSecs || 1;

  document.getElementById('clsBody').innerHTML = clsData.map((c, i) => {
    const rankClass = i < 3 ? `rank-${i+1}` : '';
    const rankLabel = i < 3 ? MEDALS[i] : `#${i+1}`;
    const avgDisp   = c.avgSecs ? fmtTime(c.avgSecs) : '완수팀 없음';
    const pct       = c.avgSecs ? Math.round((bestAvg / c.avgSecs) * 100) : 0;
    const bar       = c.avgSecs
      ? `<div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div><span style="font-size:0.75rem;color:#888">${pct}%</span></div>`
      : '—';
    return `<tr>
      <td><span class="rank-num ${rankClass}">${rankLabel}</span></td>
      <td class="name-col">${c.cls}</td>
      <td>${c.count}팀</td>
      <td>${c.completedCount}팀</td>
      <td class="score-col">${avgDisp}</td>
      <td>${bar}</td>
    </tr>`;
  }).join('');
  document.getElementById('clsTable').style.display = 'table';
}

fetchData();
</script>
</body>
</html>
